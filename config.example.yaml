netbird:
  # Self-hosted: use internal Docker network name, e.g. http://netbird-management:80
  # Cloud:       https://api.netbird.io
  management_url: "http://netbird-management:80"

  # Personal access token -- create in the NetBird dashboard under Settings -> API
  api_token: "nbp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

sync:
  # How often to poll the NetBird API (seconds)
  poll_interval: 60

  # Only sync routes that are enabled in NetBird
  only_enabled: true

routers:
  - name: "fritzbox"
    backend: tr064

    # TR-064 base URL -- Fritz!Box default is port 49000 (unencrypted) or 49443 (TLS)
    url: "http://192.168.178.1:49000"

    # Fritz!Box admin credentials (the same ones used for the web interface)
    username: "admin"
    password: "changeme"

    # Map of NetBird peer ID to LAN IP for routing peers on this router's network.
    # The daemon polls peer online status and picks the first online peer (in order)
    # as the active next-hop for each CIDR. If the active peer goes offline the route
    # is re-pointed to the next peer within one poll_interval. If all peers are
    # offline the route is removed (avoids silent blackhole).
    #
    # How to find a peer ID: run `netbird status` on the routing peer, or look in
    # the NetBird management dashboard under Peers.
    #
    # The LAN IP must remain stable -- use a static IP or a DHCP reservation.
    #
    # TODO: auto-derive from NetBird API once per-peer LAN interface info is available.
    peers:
      "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx": "192.168.178.x"  # primary routing peer
      # "yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy": "192.168.178.y"  # secondary (HA failover)

  # Add more routers below -- any TR-064 compliant device works
  # - name: "fritzbox-second-site"
  #   backend: tr064
  #   url: "http://10.0.0.1:49000"
  #   username: "admin"
  #   password: "changeme"
  #   peers:
  #     "zzzzzzzz-zzzz-zzzz-zzzz-zzzzzzzzzzzz": "10.0.0.x"
