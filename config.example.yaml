netbird:
  # Self-hosted: use internal Docker network name, e.g. http://netbird-management:80
  # Cloud:       https://api.netbird.io
  management_url: "http://netbird-management:80"

  # Personal access token -- create in the NetBird dashboard under Settings -> API
  api_token: "nbp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

sync:
  # How often to poll the NetBird API (seconds)
  poll_interval: 60

  # Only sync routes that are enabled in NetBird
  only_enabled: true

routers:
  - name: "fritzbox"
    backend: tr064

    # TR-064 base URL -- Fritz!Box default is port 49000 (unencrypted) or 49443 (TLS)
    url: "http://192.168.178.1:49000"

    # Fritz!Box admin credentials (the same ones used for the web interface)
    username: "admin"
    password: "changeme"

    # LAN IP of the NetBird routing peer -- the device that routes overlay traffic
    # into this LAN (e.g. the peer running the netbird client as a subnet router).
    # Required -- this value is used as the next-hop when adding routes and to
    # identify which existing routes are owned by this service.
    gateway_ip: "192.168.178.x"

  # Add more routers below -- any TR-064 compliant device works
  # - name: "fritzbox-second-site"
  #   backend: tr064
  #   url: "http://10.0.0.1:49000"
  #   username: "admin"
  #   password: "changeme"
  #   gateway_ip: "10.0.0.x"
